services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: ./migrator
    environment:
      DB_CONNECTION_STRING: ${DOCKER_DB_CONNECTION_STRING}
      MIGRATION_SOURCE_DIR: file://migrations
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_CONNECTION_STRING: ${DOCKER_DB_CONNECTION_STRING}
      PORT: ":8080"
      SHUTDOWN_PERIOD: "15"
      READ_WRITE_TIMEOUT: "10"
      IDLE_TIMEOUT: "60"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      migrate:
        condition: service_completed_successfully
